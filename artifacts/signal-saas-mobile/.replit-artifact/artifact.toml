kind = "mobile"
previewPath = "/mobile/"
title = "SignalStack Mobile"
version = "1.0.0"
id = "artifacts/signal-saas-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 21578

[services.development]
run = "pnpm --filter @workspace/signal-saas-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/signal-saas-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/signal-saas-mobile", "run", "serve" ]

[services.env]
PORT = "21578"
BASE_PATH = "/mobile/"
